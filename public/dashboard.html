<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sapthagiri NPS Control Center</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Login Overlay -->
<div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-darker); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);">
  <div class="glass-card" style="width: 350px; text-align: center;">
    <h2>Security Access</h2>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Enter the staff password to access the Control Center.</p>
    <input type="password" id="admin-password" placeholder="Password" style="text-align: center;">
    <button class="btn-primary" onclick="checkLogin()">Login</button>
    <p id="login-error" style="color: var(--accent-red); margin-top: 15px; display: none;">Access Denied. Incorrect Password.</p>
  </div>
</div>

<div id="dashboard-content" style="display: none;">
  <header class="dashboard-header">
    <h1>
      <img src="https://admissions.snpsu.edu.in/ion_admission_snps/assets/images/SNPS_Logo.png" alt="Logo" class="header-logo">
      Emergency Control Center
    </h1>
  </header>

  <div class="dashboard-layout">
    
    <!-- Sidebar -->
    <div class="dashboard-sidebar">
      <!-- Sweeping Radar Element -->
      <div class="radar-container" id="security-radar" title="Scanning Campus...">
        <div class="radar-sweep"></div>
        <div class="radar-blip" id="radar-blip"></div>
      </div>

      <div class="controls-bar glass-card" style="display: flex; flex-direction: column; gap: 20px;">
        <h3 style="margin-top:0; margin-bottom: 5px; color: var(--text-main); font-size: 16px;">Command Filters</h3>
        <input type="text" id="search" placeholder="🔍 Search location or type..." style="margin: 0;">
        
        <!-- Filter Pills -->
        <div class="filter-pills" id="filter-container">
          <button class="filter-pill active" data-filter="">All</button>
          <button class="filter-pill" data-filter="Pending">Pending</button>
          <button class="filter-pill" data-filter="Responding">Responding</button>
          <button class="filter-pill" data-filter="Resolved">Resolved</button>
        </div>
      </div>

      <!-- Predictive Analytics (Sidebar) -->
      <div class="analytics-stack" style="display: flex; flex-direction: column; gap: 20px;">
        <div class="stat-box" style="padding: 15px; display: flex; flex-direction: column;">
          <h3 style="margin-top: 0; margin-bottom: 10px; color: #fff; font-size: 14px;">Status Overview</h3>
          <div style="position: relative; height: 180px; width: 100%;">
            <canvas id="statusChart"></canvas>
          </div>
        </div>
        <div class="stat-box" style="padding: 15px; display: flex; flex-direction: column;">
          <h3 style="margin-top: 0; margin-bottom: 10px; color: #fff; font-size: 14px;">Incidents by Category</h3>
          <div style="position: relative; height: 180px; width: 100%;">
            <canvas id="typeChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="dashboard-main">
      <!-- Statistics -->
      <div class="stats-grid">
        <div class="stat-box glass-card">
          <div class="stat-title">Total Incidents</div>
          <div class="stat-value" id="total">0</div>
        </div>
        <div class="stat-box glass-card">
          <div class="stat-title">Active Alerts</div>
          <div class="stat-value" id="active" style="color: var(--accent-orange)">0</div>
        </div>
        <div class="stat-box glass-card">
          <div class="stat-title">Resolved</div>
          <div class="stat-value" id="resolved" style="color: var(--accent-green)">0</div>
        </div>
      </div>


      <!-- Incident List -->
      <div class="incidents-grid" id="list">
        <!-- Incidents will be populated here by dashboard.js -->
      </div>
    </div>

  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Scripts -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
