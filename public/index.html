<!DOCTYPE html>
<html>
<head>
  <title>Emergency System</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(-45deg, #020617, #0f172a, #1e293b);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 20px;
      width: 380px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,0,0,0.3), transparent);
      top: -50px;
      right: -50px;
      filter: blur(50px);
    }

    h2 {
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      outline: none;
      transition: 0.3s;
    }

    select:hover, input:hover {
      background: rgba(255,255,255,0.2);
    }

    .quick-buttons {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    .quick-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .fire { background: red; }
    .medical { background: blue; }
    .security { background: green; }

    .quick-buttons button:hover {
      transform: scale(1.1);
      opacity: 0.8;
    }

    .main-btn {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, red, orange);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .main-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px red;
    }

    .extra-btn {
      margin-top: 10px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .status-msg {
      margin-top: 15px;
      font-size: 14px;
      color: #22c55e;
      display: none;
    }

  </style>
</head>

<body>

<div class="card">

  <h2>🚨 AI Emergency Alert</h2>

  <!-- Quick Buttons -->
  <div class="quick-buttons">
    <button class="fire" onclick="setType('Fire')">🔥 Fire</button>
    <button class="medical" onclick="setType('Medical')">🚑 Medical</button>
    <button class="security" onclick="setType('Security')">🚔 Security</button>
  </div>

  <!-- Dropdown -->
  <select id="type">
    <option>Fire</option>
    <option>Medical</option>
    <option>Security</option>
  </select>

  <!-- Location -->
  <input type="text" id="location" placeholder="Enter Room / Location">

  <!-- Priority -->
  <select id="priority">
    <option>High</option>
    <option>Medium</option>
    <option>Low</option>
  </select>

  <!-- Auto Fill Location -->
  <button class="extra-btn" onclick="autoFill()">📍 Auto Detect Location</button>

  <!-- Main Button -->
  <button class="main-btn" onclick="reportIncident()">🚨 SEND ALERT</button>

  <div class="status-msg" id="msg">✔ Alert Sent Successfully</div>

</div>

<script src="script.js"></script>

<script>
function setType(val) {
  document.getElementById("type").value = val;
}

function autoFill() {
  document.getElementById("location").value = "Room " + Math.floor(Math.random() * 500);
}

async function reportIncident() {
  const type = document.getElementById("type").value;
  const location = document.getElementById("location").value;

  await fetch("http://localhost:3000/incident", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ type, location })
  });

  const msg = document.getElementById("msg");
  msg.style.display = "block";

  setTimeout(() => {
    msg.style.display = "none";
  }, 2000);
}
</script>

</body>
</html>
