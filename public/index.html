<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sapthagiri NPS University Emergency</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="reporter-wrapper">
  <div class="reporter-card glass-card">

    <img src="https://admissions.snpsu.edu.in/ion_admission_snps/assets/images/SNPS_Logo.png" alt="Sapthagiri NPS Logo" class="brand-logo">
    <h2>🚨 Emergency Alert</h2>

    <!-- Quick Buttons -->
    <div class="quick-buttons">
      <button class="quick-btn fire active" onclick="setType('Fire')">
        <span>🔥</span> Fire
      </button>
      <button class="quick-btn medical" onclick="setType('Medical')">
        <span>🚑</span> Medical
      </button>
      <button class="quick-btn security" onclick="setType('Security')">
        <span>🚔</span> Security
      </button>
    </div>

    <!-- Dropdown (Hidden but kept for logic/compatibility if needed, or we can just use a hidden input) -->
    <input type="hidden" id="type" value="Fire">

    <!-- Location -->
    <input type="text" id="location" placeholder="Enter Room / Location" autocomplete="off">

    <!-- Auto Fill Location -->
    <button class="btn-secondary" onclick="autoFill()" style="width: 100%; margin-top: 10px;">
      🏫 Auto Detect Campus Location
    </button>

    <!-- Student ID -->
    <input type="text" id="studentId" placeholder="Enter Student/Staff ID (e.g. 24SUUBECS0000)" autocomplete="off" required>

    <!-- Phone Number -->
    <input type="tel" id="phone" placeholder="Enter Mobile Number (for SMS updates)" autocomplete="off" required>

    <!-- The priority dropdown has been removed. AI Smart Triage handles it automatically based on description. -->

    <!-- Description (Optional) -->
    <textarea id="description" placeholder="Additional details... (Optional)" rows="2"></textarea>

    <!-- Hold-to-Panic Button -->
    <div class="panic-container">
      <div class="panic-ring"></div>
      <button class="btn-panic" id="panic-btn" onmousedown="startPanic()" onmouseup="stopPanic()" onmouseleave="stopPanic()" ontouchstart="startPanic()" ontouchend="stopPanic()">
        🚨 HOLD TO ALERT
      </button>
      <div class="panic-progress" id="panic-progress"></div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script src="reporter.js"></script>

</body>
</html>
